version = 0.1

default-task = 'build'

[env]
CARGO_BUILD_TARGET = 'wasm32-unknown-emscripten'
TEST_EXPORTS = '_main,_t_probe,_t_sleep_check,_t_park,_t_sequential,_t_value,_t_reject,_t_nested,_t_reentrant,_t_plain_denial,_t_noop_bracket,_t_grow,_t_scribble,_t_panic,_t_caught_panic,_t_park_during_unwind,_t_exclusive,_t_enter_check,_t_exclusive_check'
TEST_LINK = '-Clink-arg=-sALLOW_MEMORY_GROWTH -Clink-arg=-sMODULARIZE -Clink-arg=-sEXPORTED_RUNTIME_METHODS=wasmExports'

[[task]]
name = 'build'
run = 'CARGO_TARGET_WASM32_UNKNOWN_EMSCRIPTEN_RUSTFLAGS="-Clink-arg=-sJSPI -Clink-arg=-sALLOW_MEMORY_GROWTH" cargo build'

[[task]]
name = 'test'
deps = [
    'test:debug',
    'test:release',
    'test:proof',
    'test:no-jspi',
]

# debug is load-bearing: -O0 spills all locals — the worst case for the
# save-state transit kernel
[[task]]
name = 'test:debug'
run = '''
CARGO_TARGET_WASM32_UNKNOWN_EMSCRIPTEN_RUSTFLAGS="-Clink-arg=-sJSPI $TEST_LINK -Clink-arg=-sEXPORTED_FUNCTIONS=$TEST_EXPORTS" cargo build --example test_module || exit 1
node tests/driver.cjs target/wasm32-unknown-emscripten/debug/examples/test_module.js
'''

[[task]]
name = 'test:release'
run = '''
CARGO_TARGET_WASM32_UNKNOWN_EMSCRIPTEN_RUSTFLAGS="-Clink-arg=-sJSPI $TEST_LINK -Clink-arg=-sEXPORTED_FUNCTIONS=$TEST_EXPORTS" cargo build --release --example test_module || exit 1
node tests/driver.cjs target/wasm32-unknown-emscripten/release/examples/test_module.js
'''

# prove the corruption scenario bites: with virtualization disabled it must
# NOT pass cleanly (assertion failure, rejection, or abort all count)
[[task]]
name = 'test:proof'
run = '''
export CARGO_TARGET_DIR=target/no-virtualize
CARGO_TARGET_WASM32_UNKNOWN_EMSCRIPTEN_RUSTFLAGS="-Clink-arg=-sJSPI $TEST_LINK -Clink-arg=-sEXPORTED_FUNCTIONS=$TEST_EXPORTS --cfg jspi_disable_virtualization" cargo build --example test_module || exit 1
if node tests/driver.cjs --proof target/no-virtualize/wasm32-unknown-emscripten/debug/examples/test_module.js 2>/dev/null; then
  echo "ERROR: corruption scenario passed with virtualization disabled" && exit 1
else
  echo "corruption scenario bites (failed as expected with virtualization disabled)"
fi
'''

# without -sJSPI: jspi_enabled() false, enters work, no-op bracket degrades
[[task]]
name = 'test:no-jspi'
run = '''
export CARGO_TARGET_DIR=target/no-jspi
CARGO_TARGET_WASM32_UNKNOWN_EMSCRIPTEN_RUSTFLAGS="$TEST_LINK -Clink-arg=-sEXPORTED_FUNCTIONS=$TEST_EXPORTS" cargo build --example test_module || exit 1
node tests/driver.cjs --no-jspi target/no-jspi/wasm32-unknown-emscripten/debug/examples/test_module.js
'''
